<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Grand Ascent — Lift Operator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Jost:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#151210; --panel:#1e1a16; --brass:#c9a227; --brass-hi:#f0d68a;
    --jade:#2e6f5e; --cream:#f4e8cf; --rust:#a63d2f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--ink);
    background-image:
      repeating-linear-gradient(45deg, transparent 0 34px, rgba(201,162,39,.05) 34px 36px),
      repeating-linear-gradient(-45deg, transparent 0 34px, rgba(201,162,39,.05) 34px 36px);
    color:var(--cream);
    font-family:'Jost',sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;overflow:hidden;user-select:none;
  }
  header{display:flex;align-items:baseline;gap:22px}
  h1{
    font-family:'Limelight',cursive;font-weight:400;color:var(--brass);
    font-size:clamp(15px,2.4vh,24px);letter-spacing:.14em;line-height:1;
    text-shadow:0 0 18px rgba(201,162,39,.35), 0 2px 0 #000;
  }
  header small{font-size:11px;letter-spacing:.4em;color:var(--cream);opacity:.6;text-transform:uppercase}
  .marquee{
    padding:7px;border:2px solid var(--brass);outline:2px solid #4a3a12;outline-offset:3px;
    background:linear-gradient(180deg,#26211b,#191512);
    box-shadow:0 0 0 7px var(--panel), 0 24px 60px rgba(0,0,0,.7);
    position:relative;
  }
  .marquee::before,.marquee::after{
    content:"";position:absolute;top:-2px;bottom:-2px;width:9px;
    background:repeating-linear-gradient(180deg,var(--brass) 0 6px,transparent 6px 14px);
    opacity:.9;
  }
  .marquee::before{left:-13px}.marquee::after{right:-13px}
  canvas{display:block;image-rendering:pixelated;background:#0d0b09}
  .legend{display:flex;gap:24px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.85}
  .legend b{
    border:1px solid var(--brass);border-radius:4px;padding:0 7px;
    color:var(--brass-hi);background:#000;margin-right:5px;font-weight:600;
  }
</style>
</head>
<body>
  <header><h1>THE GRAND ASCENT</h1><small>hotel lift operator · est. 1926</small></header>
  <div class="marquee"><canvas id="cv"></canvas></div>
  <div class="legend">
    <span><b>&uarr;&darr;</b>lever</span>
    <span><b>space</b>gate</span>
    <span><b>esc</b>pause</span>
    <span><b>enter</b>start over</span>
  </div>
<script>
"use strict";
/* ================= THE GRAND ASCENT =================
   Single-file 16-bit-fidelity prototype. All art programmatic. */

const VW=640, VH=400, FLOOR_H=84;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
function fit(){
  const aw=innerWidth-30, ah=innerHeight-96;
  let s=Math.min(aw/VW, ah/VH);
  s=Math.max(1, Math.floor(s*4)/4);          // quarter-integer steps: crisp but near-full
  cv.width=VW; cv.height=VH;
  cv.style.width=VW*s+'px'; cv.style.height=VH*s+'px';
  ctx.imageSmoothingEnabled=false;
}
addEventListener('resize',fit); fit();

/* ---------- palette ---------- */
const P={
  night:'#0d0b09', slab:'#3a2e24', slabHi:'#55432f', slabLo:'#241a12',
  brass:'#c9a227', brassHi:'#f0d68a', brassLo:'#7a5f14', brassDk:'#4a3a12',
  jade:'#2e6f5e', jadeHi:'#4a9a83', cream:'#f4e8cf', rust:'#a63d2f',
  shaft:'#100d0c', shaft2:'#1a1512', rail:'#332b25',
  ok:'#7fbf6a', warn:'#e0a83c', bad:'#d5533c',
};
/* per-floor decor themes: [wall, wallShade, accent, wainscot] */
const THEMES=[
  ['#41635a','#37544c','#79a89b','#2b3f39'], ['#5f4d68','#50415a','#9a83a8','#3c3244'],
  ['#71503f','#5f4335','#b08668','#47342a'], ['#48607a','#3d5268','#7f9cb8','#303f50'],
  ['#6f5f3c','#5d5033','#b3a06a','#453b28'], ['#53704c','#465f40','#8bab82','#364a32'],
  ['#6d4655','#5b3b48','#a87c8d','#442e38'], ['#3f6570','#35565f','#74a2af','#2a434b'],
];
const COATS=[
  ['#5a4a63','#463a4e','#6f5d7a'], ['#3d5a52','#2f463f','#4f7266'], ['#7a3b30','#602e26','#95594d'],
  ['#44586b','#354553','#5a7085'], ['#8a7440','#6e5c33','#a48f5c'], ['#404a5f','#32394a','#556174'],
  ['#6b5a3c','#554730','#857252'], ['#2f4a44','#243a35','#436058'],
];
const SKINS=[['#e8b98a','#c99569'],['#c68f5f','#a67246'],['#f0cba2','#d3a97c']];
const HAIRS=['#2a2018','#4a3120','#6b5335','#1d1a16','#7a6a55'];

/* ---------- audio (synth, created on first input) ---------- */
let AC=null;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function env(g,t,a,d,v){ g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+a); g.gain.exponentialRampToValueAtTime(.0001,t+a+d); }
function tone(freq,type,a,d,v,slide){
  const c=ac(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t+a+d);
  env(g,t,a,d,v); o.connect(g).connect(c.destination); o.start(t); o.stop(t+a+d+.05);
}
function noise(d,v,f){
  const c=ac(),t=c.currentTime,len=c.sampleRate*d,buf=c.createBuffer(1,len,c.sampleRate),ch=buf.getChannelData(0);
  for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
  const s=c.createBufferSource(),g=c.createGain(),lp=c.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=f; s.buffer=buf; env(g,t,.005,d,v);
  s.connect(lp).connect(g).connect(c.destination); s.start(t);
}
const S={
  gate(open){ noise(.14,.25,open?900:600); tone(open?220:170,'square',.005,.1,.06); },
  clank(){ noise(.08,.3,400); tone(90,'square',.005,.12,.12); },
  ding(n=0){ tone(880*Math.pow(1.25,n),'sine',.005,.6,.16); tone(1760*Math.pow(1.25,n),'sine',.005,.3,.05); },
  coin(){ tone(1245,'square',.003,.07,.07); setTimeout(()=>tone(1660,'square',.003,.2,.07),60); },
  huff(){ noise(.22,.22,300); tone(140,'sawtooth',.02,.18,.05,80); },
  fanfare(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.01,.35,.12),i*110)); },
  denied(){ tone(120,'square',.005,.09,.08); },
};

/* ---------- state ---------- */
const HS_KEY='grandAscentHS';
let G;
function reset(){
  G={
    state:'title', t:0,
    pos:0, vel:0,               // pos in floor units, 0 = lobby
    floors:5, cap:3, base:0, justDug:false,
    scheme:(G&&G.scheme)||'classic',            // 'classic' | 'wheel' | 'dispatch' — survives restarts
    autoTarget:null, dev:false, devBuf:'',
    up:{}, offers:null, pickSel:0, graceT:0, silk:false, flawless:0,
    transferDur:0.45,
    doorT:0, doorOpen:false,    // doorT 0..1 openness
    transfer:null, transferT:0, // passenger mid-doorway
    pax:[], spawnT:3, spawnId:0,
    tips:0, delivered:0, nextFloorAt:8, strikes:0,
    maxFloor:0, camY:0, msg:null, msgT:0, shake:0,
    hs:JSON.parse(localStorage.getItem(HS_KEY)||'{"floor":0,"tips":0}'),
  };
}
reset();

function say(txt,t=2.4){ G.msg=txt; G.msgT=t; }
function floorName(f){ return f===0?'L':(f<0?'B'+(-f):''+f); }
const BASEMENTS=[
  {name:"WU'S LAUNDRY",   sign:'#4a9a83'},
  {name:'THE VELVET ROOM',sign:'#d5533c'},
  {name:'THE BLIND TIGER',sign:'#e0a83c'},
];

/* ---------- upgrades (drafted 1-of-2 when a floor opens) ---------- */
const UPGRADES={
  cap:   {name:'WIDER CAR',     desc:'One more guest fits aboard',        max:5},
  speed: {name:'NEW WINCH',     desc:'The car pulls 12% faster',          max:4},
  gate:  {name:'OILED GATE',    desc:'Gate & boarding move quicker',      max:3},
  magnet:{name:'FLOOR MAGNET',  desc:'Car settles itself level',          max:2},
  music: {name:'GRAMOPHONE',    desc:'Riders stay calm 25% longer',       max:3},
  clerk: {name:'DESK CLERK',    desc:'Hall guests fret 15% slower',       max:3},
  tipjar:{name:'BRASS TIP JAR', desc:'All tips grow by 15%',              max:3},
  favor: {name:"MANAGER'S FAVOR",desc:'One more strike allowed',          max:2},
  counter:{name:'COUNTERWEIGHT', desc:'Fuller car, faster winch',         max:2},
  bellboy:{name:'LOBBY BELLBOY', desc:'Swift boarding at the lobby',      max:2},
};
function maxStrikes(){ return 3+upLv('favor'); }
function upLv(id){ return G.up[id]||0; }
function rollOffers(){
  const pool=Object.keys(UPGRADES).filter(id=>upLv(id)<UPGRADES[id].max);
  for(let i=pool.length-1;i>0;i--){ const j=rnd(i+1); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool.slice(0,2);
}
function pickUpgrade(i){
  const id=G.offers&&G.offers[i]; if(!id) return;
  G.up[id]=upLv(id)+1;
  if(id==='cap') G.cap=Math.min(9,G.cap+1);
  G.offers=null; G.state='play'; G.graceT=8; S.ding(2);
  if(G.justDug){ G.justDug=false; say('WORD IS '+BASEMENTS[G.base-1].name+' JUST OPENED BELOW THE STREET...',3.5); }
  else say('FLOOR '+floorName(G.floors-1)+' OPEN  ·  '+UPGRADES[id].name+' INSTALLED',3);
}
/* ---------- DEV level (hidden: type D-E-V at the title) ---------- */
function startDev(){
  const scheme=G.scheme; reset();
  G.scheme=scheme; G.dev=true; G.state='play';
  G.floors=20; G.base=3; G.cap=6; G.nextFloorAt=8;
  say('DEV LEVEL  ·  N GUEST · M WACKY · U UPGRADES',4);
}
function devCycleUpgrade(id){
  G.up[id]=(upLv(id)+1)%(UPGRADES[id].max+1);
  if(id==='cap') G.cap=3+G.up.cap;
  S.ding(1);
}
function devMenuRowAt(mx,my){
  const keys2=Object.keys(UPGRADES);
  for(let i=0;i<keys2.length;i++){
    const ry=118+i*24;
    if(my>ry-14&&my<ry+6&&mx>VW/2-150&&mx<VW/2+150) return keys2[i];
  }
  return null;
}

function xferTime(){
  let t=(G.silk?0.24:0.45)*Math.pow(0.88,upLv('gate'));
  if(Math.round(G.pos)===0) t*=Math.pow(0.78,upLv('bellboy'));   // the bellboy hustles
  return t;
}

/* ---------- passengers ---------- */
function rnd(n){ return Math.floor(Math.random()*n); }

/* ---- the cast: named characters, tiered by tower height (see CHARACTERS.md) ---- */
const TIER_UNLOCK={1:7,2:12,3:17}, CELEB_UNLOCK=15;
const ARCH={
  bellhop:  {tier:1,w:3,pat:0.8, tip:0.6,rule:'cross',    lady:false},
  flapper:  {tier:1,w:2,pat:1.1, tip:1.3,rule:'top2',     lady:true},
  salesman: {tier:1,w:2,pat:0.7, tip:0.7,rule:'nextfloor',lady:false},
  chef:     {tier:1,w:2,pat:1.3, tip:1.6,rule:'kitchen',  lady:false},
  aviatrix: {tier:2,w:2,pat:0.85,tip:1.5,rule:'roof',     lady:true, pants:true},
  zora:     {tier:2,w:1,pat:0.6, tip:1.2,rule:'floor13',  lady:true, gown:true, needs:14},
  flint:    {tier:2,w:2,pat:0.75,tip:1.0,rule:'shadow',   lady:false},
  bootlegger:{tier:2,w:1,pat:1.15,tip:2.0,rule:'cellar',   lady:false},
  professor:{tier:2,w:2,pat:0.55,tip:1.1,rule:'reroll',   lady:false},
  diva:     {tier:3,w:2,pat:1.8, tip:3.0,rule:'lobbytop3',lady:true, gown:true},
  boone:    {tier:3,w:2,pat:0.7, tip:1.8,rule:'gig',      lady:false},
  baroness: {tier:3,w:2,pat:1.2, tip:2.2,rule:'audit',    lady:true},
  colonel:  {tier:3,w:2,pat:0.4, tip:1.0,rule:'longhaul', lady:false, needs:7},
  gloria:   {tier:9,w:1,pat:1.5, tip:4.0,rule:'penthouse',lady:true, gown:true, celeb:true, announce:'GLORIA DELACROIX HAS ARRIVED'},
  magnifico:{tier:9,w:1,pat:1.4, tip:2.5,rule:'cross',    lady:false, celeb:true, vanish:true, announce:'IL MAGNIFICO GRACES THE HOTEL'},
  duchess:  {tier:9,w:1,pat:0.9, tip:2.0,rule:'promenade',lady:true, celeb:true, announce:'THE DUCHESS OF MARLOW & BIJOU'},
};
function pickWeighted(keys){
  const tot=keys.reduce((s,k)=>s+ARCH[k].w,0); let r=Math.random()*tot;
  for(const k of keys){ r-=ARCH[k].w; if(r<=0) return k; }
  return keys[keys.length-1];
}
function archEligible(k){ const a=ARCH[k]; return !a.needs||G.floors>=a.needs; }
function routeFor(rule){
  const top=G.floors-1;
  switch(rule){
    case 'cross':    { const f=rnd(G.floors); let d; do{d=rnd(G.floors);}while(d===f); return [f,d]; }
    case 'top2':     return [0, top-rnd(Math.min(2,top))];
    case 'nextfloor':{ const f=rnd(G.floors); return [f, f===0?1:(f===top?top-1:(Math.random()<0.5?f-1:f+1))]; }
    case 'kitchen':  { const u=2+rnd(Math.max(1,top-1)); return Math.random()<0.5?[1,Math.min(top,u)]:[Math.min(top,u),1]; }
    case 'roof':     return [0,top];
    case 'floor13':  { let f; do{f=rnd(G.floors);}while(f===13); return [f,13]; }
    case 'shadow':   { const last=[...G.pax].reverse().find(p=>p.state==='waiting'); return last?[last.from,last.dest]:null; }
    case 'cellar':   { const from=G.base>0?-1-rnd(G.base):2;           // runs crates up from the speakeasy once it exists
                       const d=Math.min(top,3+rnd(Math.max(1,top-2))); return d===from?null:[from,d]; }
    case 'reroll':   return null;                      // normal roll; quirk fires while waiting
    case 'lobbytop3':{ const t3=top-rnd(Math.min(3,top)); return Math.random()<0.5?[0,t3]:[t3,0]; }
    case 'gig':      return Math.random()<0.6?[0,top]:[top,0];
    case 'audit':    { let best=0,n=-1; for(let f2=-G.base;f2<G.floors;f2++){ const c=waitersAt(f2).length; if(c>n){n=c;best=f2;} }
                       if(n<=0) return null; let f; do{f=rnd(G.floors);}while(f===best); return [f,best]; }
    case 'longhaul': { const f=rnd(G.floors), ups=top-f>=6, downs=f>=6;
                       if(!ups&&!downs) return null;
                       const up=ups&&(!downs||Math.random()<0.5);
                       return [f, up? f+6+rnd(top-f-5) : f-6-rnd(f-5)]; }
    case 'penthouse':return [0,top];
    case 'promenade':{ const f=rnd(G.floors), hop=2+rnd(2);
                       const d=(f+hop<=top&&(Math.random()<0.5||f-hop<0))?f+hop:Math.max(0,f-hop);
                       return d===f?null:[f,d]; }
  }
  return null;
}
/* ordinary-guest wardrobe grows with the tower */
const COATS9 =[['#5a3a5e','#472e4a','#735079'],['#3a5a3e','#2d4630','#4e7253']];
const COATS13=[['#a3852e','#836a24','#bd9f4a'],['#5a7a9a','#47617b','#7495b3']];
const COATS17=[['#d8cbb0','#b5a98f','#f4e8cf'],['#26221e','#1a1714','#38332d']];
const ARCH_COATS={
  bellhop:['#a63d2f','#7d2e23','#c25a4a'], flapper:['#1f7a8c','#155e6d','#3aa0b5'],
  salesman:['#8a7440','#6e5c33','#a48f5c'], chef:['#f4e8cf','#d8cbb0','#ffffff'],
  aviatrix:['#6b4a2c','#523821','#8a6540'], zora:['#3d2b52','#2c1f3d','#584175'],
  flint:['#4a453c','#3a362f','#5d574c'], bootlegger:['#33383f','#262a30','#4a515c'],
  professor:['#5c5a3e','#4a4832','#757352'], diva:['#8c1f2e','#6d1723','#b03a4a'],
  boone:['#f4e8cf','#d8cbb0','#ffffff'], baroness:['#1d1814','#12100d','#33302a'],
  colonel:['#9a8a5c','#7e7049','#b5a677'], gloria:['#ffffff','#dcdcdc','#f4e8cf'],
  magnifico:['#1d1814','#12100d','#2e2a24'], duchess:['#8a8578','#6f6b60','#a5a094'],
};

function spawnPassenger(force){
  const top=G.floors-1;
  /* --- who arrives? --- */
  let arch=null;
  if(force==='wacky'){
    const pool=Object.keys(ARCH).filter(archEligible);
    arch=pool[rnd(pool.length)];
  }
  else if(force!=='normal'&&G.floors>=CELEB_UNLOCK && Math.random()<1/25 && !G.pax.some(p=>p.arch&&ARCH[p.arch].celeb)){
    const pool=Object.keys(ARCH).filter(k=>ARCH[k].celeb&&archEligible(k));
    if(pool.length) arch=pickWeighted(pool);
  }
  if(!arch&&force!=='normal'&&force!=='wacky'){
    const t1=G.floors>=TIER_UNLOCK[1]?0.18:0, t2=G.floors>=TIER_UNLOCK[2]?0.15:0, t3=G.floors>=TIER_UNLOCK[3]?0.10:0;
    const r=Math.random(); let tier=0;
    if(r<t3) tier=3; else if(r<t3+t2) tier=2; else if(r<t3+t2+t1) tier=1;
    if(tier>0){
      const pool=Object.keys(ARCH).filter(k=>ARCH[k].tier===tier&&archEligible(k));
      if(pool.length) arch=pickWeighted(pool);
    }
  }
  const a=arch?ARCH[arch]:null;
  /* --- where to? --- */
  let from,dest,route=a?routeFor(a.rule):null;
  if(route){ [from,dest]=route; }
  else if(G.base>0&&Math.random()<0.15){
    // underworld traffic: to or from the joints below the street
    const b=-1-rnd(G.base);
    if(Math.random()<0.5){ from=b; dest=Math.random()<0.6?0:1+rnd(top); }
    else { from=Math.random()<0.6?0:1+rnd(top); dest=b; }
  }
  else {
    const r=Math.random();
    if(r<0.5){ from=0; dest=1+rnd(top); }
    else if(r<0.85){ from=1+rnd(top); dest=0; }
    else { from=rnd(G.floors); do{dest=rnd(G.floors);}while(dest===from); }
  }
  const evening=G.floors>=13;
  const coats=COATS.concat(G.floors>=9?COATS9:[], G.floors>=13?COATS13:[], G.floors>=17?COATS17:[]);
  G.pax.push({
    id:G.spawnId++, from, dest, state:'waiting',
    grump:0, angry:false, struck:false, waitT:0, rerolled:false,
    arch, patMul:a?a.pat:0.85+Math.random()*0.3, tipMul:a?a.tip:1,
    vanish:!!(a&&a.vanish), puffT:(arch==='magnifico')?0.5:0,
    x:0, walk:0, coat:arch?ARCH_COATS[arch]:coats[rnd(coats.length)],
    hat:a?false:Math.random()<(evening?.75:.6), lady:a?!!a.lady:Math.random()<.4,
    pants:!!(a&&a.pants), gown:!!(a&&a.gown),
    skin:SKINS[rnd(SKINS.length)], hair:HAIRS[rnd(HAIRS.length)],
    bag:a?false:Math.random()<.3,
  });
  if(a&&a.celeb){ say(a.announce,3); S.fanfare(); }
}
function waitersAt(f){ return G.pax.filter(p=>p.state==='waiting'&&p.from===f); }
function riders(){ return G.pax.filter(p=>p.state==='riding'); }

function strike(p){
  if(p.struck) return;
  p.struck=true; G.strikes++; G.shake=.35; S.huff();
  if(G.dev){ say('DEV: STORM-OFF ('+G.strikes+') — NO CONSEQUENCES',2); return; }
  say(G.strikes>=maxStrikes()?'THE MANAGEMENT HAS SEEN ENOUGH':'A GUEST STORMS OFF!  ('+G.strikes+'/'+maxStrikes()+')');
  if(G.strikes>=maxStrikes()){
    G.state='over';
    if(G.maxFloor>G.hs.floor||(G.maxFloor===G.hs.floor&&G.tips>G.hs.tips)){
      G.hs={floor:G.maxFloor,tips:G.tips};
      localStorage.setItem(HS_KEY,JSON.stringify(G.hs));
    }
  }
}

/* ---------- update ---------- */
const keys={};
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if(keys[e.code]) return; keys[e.code]=true; ac();
  if(G.state==='title'){
    if(/^Key[A-Z]$/.test(e.code)){                       // hidden: type DEV for the test level
      G.devBuf=(G.devBuf+e.code[3]).slice(-3);
      if(G.devBuf==='DEV'){ startDev(); return; }
    }
    if(e.code==='Digit1') G.scheme='classic';
    else if(e.code==='Digit2') G.scheme='wheel';
    else if(e.code==='Digit3') G.scheme='dispatch';
    else if(e.code!=='Space'&&e.code!=='Enter') return;
    G.state='play';
    say('GOOD MORNING, OPERATOR'+(G.scheme!=='classic'?'  ·  '+(G.scheme==='wheel'?'WHEEL':'DISPATCH')+' CONTROLS':''),2.5);
    return;
  }
  if(G.state==='over'&&e.code==='Enter'){ reset(); G.state='play'; return; }
  if(e.code==='Escape'){
    if(G.state==='play'){ G.state='pause'; for(const k in keys) keys[k]=false; return; }
    if(G.state==='pause'){ G.state='play'; return; }
  }
  if(G.state==='pause') return;
  if(G.state==='devmenu'){ if(e.code==='KeyU'||e.code==='Escape') G.state='play'; return; }
  if(G.state==='play'&&G.dev){
    if(e.code==='KeyN'){ spawnPassenger('normal'); return; }
    if(e.code==='KeyM'){ spawnPassenger('wacky'); return; }
    if(e.code==='KeyU'){ G.state='devmenu'; return; }
  }
  if(G.state==='pick'){
    if(e.code==='ArrowLeft'||e.code==='ArrowRight'){ G.pickSel=1-G.pickSel; S.denied(); }
    else if(e.code==='Digit1') pickUpgrade(0);
    else if(e.code==='Digit2') pickUpgrade(1);
    else if(e.code==='Enter') pickUpgrade(G.pickSel);  // NOT Space — that's the gate key; mis-presses were installing upgrades
    return;
  }
  if(G.state!=='play') return;
  if(e.code==='Space') toggleGate();
});
addEventListener('keyup',e=>keys[e.code]=false);

/* scroll-wheel lever: each notch is a shove; momentum still rules */
cv.addEventListener('wheel',e=>{
  if(G.scheme!=='wheel'||G.state!=='play') return;
  e.preventDefault(); ac();
  if(G.doorT>0.02) return;                              // interlock holds
  G.vel+=-Math.sign(e.deltaY)*0.38;
},{passive:false});

/* mouse: menus are clickable everywhere; in dispatch scheme, floors too */
const TITLE_SCHEME_ROWS=[[5,'classic'],[6,'wheel'],[7,'dispatch']];  // line indices in the title overlay
cv.addEventListener('mousedown',e=>{
  ac();
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*VW, my=(e.clientY-r.top)/r.height*VH;
  if(G.state==='title'){
    for(const [row,scheme] of TITLE_SCHEME_ROWS){
      const ry=136+row*20;
      if(my>ry-13&&my<ry+5&&mx>VW/2-190&&mx<VW/2+190){
        G.scheme=scheme; G.state='play';
        say('GOOD MORNING, OPERATOR'+(scheme!=='classic'?'  ·  '+(scheme==='wheel'?'WHEEL':'DISPATCH')+' CONTROLS':''),2.5);
        return;
      }
    }
    return;
  }
  if(G.state==='over'){ reset(); G.state='play'; return; }
  if(G.state==='pause'){ G.state='play'; return; }
  if(G.state==='pick'){
    const cw=210,ch=124,cy0=140;
    for(let i=0;i<(G.offers||[]).length;i++){
      const x=VW/2+(i===0?-cw-14:14);
      if(mx>x&&mx<x+cw&&my>cy0&&my<cy0+ch){ pickUpgrade(i); return; }
    }
    return;
  }
  if(G.state==='devmenu'){
    const hit=devMenuRowAt(mx,my);
    if(hit) devCycleUpgrade(hit);
    return;
  }
  if(G.state==='play'&&G.scheme==='dispatch'){
    let f;
    if(mx>VW-34){                                        // minimap strip
      const mh=VH-120,my0=64,mlo=-G.base,mspan=Math.max(1,G.floors-1-mlo);
      f=Math.round(((my0+mh-my)/mh)*mspan+mlo);
    } else {
      f=Math.floor(((VH-50-my)+G.camY)/FLOOR_H);
    }
    if(f>=-G.base&&f<G.floors){
      G.autoTarget=f;
      if(G.doorOpen&&!G.transfer) toggleGate();          // close up and go
    }
  }
});

function flushFloor(){
  const f=Math.round(G.pos);
  if(f<-G.base||f>=G.floors) return -99;
  const tol=0.085*(1+0.25*upLv('magnet'));
  return (Math.abs(G.pos-f)<tol && Math.abs(G.vel)<0.3) ? f : -99;
}
function toggleGate(){
  if(G.doorOpen){
    if(G.transfer){ S.denied(); return; }             // someone in the doorway
    G.doorOpen=false; S.gate(false);
    // snub: whoever is left waiting here takes it personally
    const f=Math.round(G.pos), full=riders().length>=G.cap;
    waitersAt(f).forEach(p=>p.grump=Math.min(1.2,p.grump+(full?0.25:0.12)));
  } else {
    const f=flushFloor();
    if(f===-99){ S.denied(); say('LINE UP THE CAR, OPERATOR!',1.2); return; }
    G.silk=Math.abs(G.pos-f)<0.035&&G.scheme!=='dispatch'; // no silk bonus when the car parks itself
    G.doorOpen=true; G.vel=0; G.pos=f; S.gate(true);
    if(G.silk){ S.ding(3); say('SILK STOP — SWIFT SERVICE!',1); }
    if(f>G.maxFloor) G.maxFloor=f;
  }
}

function update(dt){
  G.t+=dt;
  if(G.msgT>0) G.msgT-=dt;
  if(G.shake>0) G.shake-=dt;
  if(G.state!=='play'){ return; }

  /* --- lever & physics --- */
  const locked=G.doorT>0.02;
  const load=riders().length/Math.max(1,G.cap);                 // counterweight pulls harder when loaded
  const cw=1+0.15*upLv('counter')*load;
  const ACC=3.4*(1+0.10*upLv('speed'))*cw, MAX=2.7*(1+0.12*upLv('speed'))*cw, DRAG=0.85;
  let input=0;
  if(!locked){
    if(G.scheme==='dispatch'){
      // autopilot: the routing IS the game — car drives itself to the clicked floor
      if(G.autoTarget!==null){
        const d=G.autoTarget-G.pos, ad=Math.abs(d), dir=Math.sign(d);
        const bd=(G.vel*G.vel)/(2*ACC);
        if(ad<0.02&&Math.abs(G.vel)<0.15){
          G.pos=G.autoTarget; G.vel=0; const f=G.autoTarget; G.autoTarget=null;
          G.silk=false; G.doorOpen=true; G.doorT=Math.max(G.doorT,0.02); S.gate(true);   // doors open themselves
          if(f>G.maxFloor) G.maxFloor=f;
        }
        else if(Math.sign(G.vel)===dir&&bd>=ad-0.02) input=-dir;
        else if(Math.abs(G.vel)<(ad<0.5?0.55:MAX)) input=dir;
      }
    } else {
      if(keys.ArrowUp||keys.KeyW)input+=1;
      if(keys.ArrowDown||keys.KeyS)input-=1;
    }
  }
  G.vel+=input*ACC*dt;
  if(!input) G.vel*=Math.exp(-DRAG*dt);          // coast — momentum is the game
  if(!input && Math.abs(G.vel)<0.04) G.vel=0;
  G.vel=Math.max(-MAX,Math.min(MAX,G.vel));
  G.pos+=G.vel*dt;
  const top=G.floors-1;
  if(G.pos<-G.base){ G.pos=-G.base; if(G.vel<-0.5)S.clank(); G.vel=0; }
  if(G.pos>top){ G.pos=top; if(G.vel>0.5)S.clank(); G.vel=0; }
  // floor magnet: settles the last inch, but only once you've all but stopped yourself
  if(upLv('magnet')&&!input&&!locked){
    const nf=Math.round(G.pos), off=G.pos-nf;
    if(nf>=-G.base&&nf<G.floors&&Math.abs(off)<0.09&&Math.abs(G.vel)<0.22){
      G.pos-=off*Math.min(1,dt*1.3*upLv('magnet'));
      G.vel*=Math.exp(-2*upLv('magnet')*dt);
    }
  }

  /* --- gate anim --- */
  G.doorT+=((G.doorOpen?1:0)-G.doorT)*Math.min(1,dt*(7+2.5*upLv('gate')));
  if(G.doorOpen&&G.doorT>0.99) G.doorT=1;

  /* --- doorway traffic (one at a time) --- */
  if(G.doorT===1){
    const f=Math.round(G.pos);
    if(G.transfer){
      G.transferT-=dt;
      if(G.transferT<=0){
        const p=G.transfer; G.transfer=null;
        if(p.state==='exiting'){
          p.state='gone';
          if(!p.angry){
            let tip=(0.5+4.5*Math.pow(Math.max(0,1-p.grump),1.4))*(1+0.15*upLv('tipjar'))*(p.tipMul||1);
            if(G.silk) tip*=1.25;                       // silk stops pay better
            if(p.from<0||p.dest<0) tip*=1.5;            // hush money from below the street
            G.tips+=tip; G.delivered++; S.coin();
            /* commendations: flawless streaks buy back strikes */
            G.flawless++;
            if(G.flawless>=20){
              G.flawless=0;
              if(G.strikes>0){ G.strikes--; S.fanfare(); say('COMMENDATION! THE MANAGER WITHDRAWS A STRIKE',3); }
              else { G.tips+=5; S.ding(1); say('COMMENDATION! A CRISP $5 FROM THE MANAGER',3); }
            }
            /* the tower grows — pause for an upgrade draft */
            if(G.delivered>=G.nextFloorAt){
              G.nextFloorAt+=8; G.floors++;
              if(G.base<3&&Math.random()<0.3){ G.base++; G.justDug=true; }  // something stirs below
              G.offers=rollOffers(); G.pickSel=0; S.fanfare();
              if(G.offers.length) G.state='pick';
              else { G.graceT=8; say('FLOOR '+floorName(G.floors-1)+' NOW OPEN',3); }
            }
          }
        }
        else if(p.state==='boarding'){
          p.state='riding'; p.grump=Math.max(0,p.grump-0.2);
          if(p.arch==='boone') S.fanfare();             // the bandleader boards with a flourish
        }
      }
    } else {
      const out=riders().find(p=>p.dest===f||p.angry);
      if(out){ out.state='exiting'; G.transfer=out; G.transferDur=xferTime(); G.transferT=G.transferDur; }
      else if(riders().length<G.cap){
        const inn=waitersAt(f)[0];
        if(inn){ inn.state='boarding'; G.transfer=inn; G.transferDur=xferTime(); G.transferT=G.transferDur; }
      }
    }
  }

  /* --- patience --- */
  if(G.graceT>0) G.graceT-=dt;                        // ribbon-cutting breather
  const diff=Math.min(2.4,1+(G.floors-2)*0.05);       // difficulty follows the tower
  const calm=G.graceT>0?0.5:1;
  for(const p of G.pax){
    if(p.puffT>0) p.puffT-=dt;
    if(p.state==='waiting'){
      p.waitT=(p.waitT||0)+dt;
      // named guests ride odd routes, so they carry longer fuses — chaos, not emergencies
      p.grump+=dt/(p.arch?52:42)*diff*calm*(p.patMul||1)*Math.pow(0.85,upLv('clerk'));
      // the professor remembers it was a different floor after all
      if(p.arch==='professor'&&!p.rerolled&&p.waitT>10){
        p.rerolled=true; let d; do{d=rnd(G.floors);}while(d===p.from||d===p.dest); p.dest=d;
      }
      if(p.grump>=1&&p.vanish){ p.state='gone'; say("HE'S GONE! ...HOW?",2.5); continue; }
      if(p.grump>=1&&!p.struck){ p.state='storming'; p.walk=0; strike(p); }
    } else if(p.state==='riding'){
      // longer trips come with longer fuses — guests know the penthouse is far
      p.grump+=dt/((p.arch?100:88)*(1+0.12*Math.abs(p.dest-p.from)))*diff*calm*(p.patMul||1)*Math.pow(0.75,upLv('music'));
      if(p.grump>=1&&p.vanish){ p.state='gone'; say('HE HAS VANISHED FROM A MOVING LIFT!',2.5); continue; }
      if(p.grump>=1&&!p.angry){ p.angry=true; strike(p); say('A GUEST IS FUMING IN THE CAR!',2); }
    } else if(p.state==='storming'){
      p.walk+=dt; if(p.walk>1.6) p.state='gone';
    }
  }
  G.pax=G.pax.filter(p=>p.state!=='gone');

  /* --- spawning (paused during the ribbon-cutting; manual-only in dev) --- */
  if(G.graceT<=0&&!G.dev) G.spawnT-=dt;
  if(G.spawnT<=0){
    spawnPassenger();
    const base=Math.max(3.05,7.2-0.32*G.floors);      // plateau above lift throughput
    G.spawnT=base*(0.7+Math.random()*0.6);
  }

  /* --- camera --- */
  const buildingH=G.floors*FLOOR_H+60;
  const carWorldY=G.pos*FLOOR_H;
  let target=carWorldY-VH/2+FLOOR_H;
  target=Math.max(-30-G.base*FLOOR_H,Math.min(buildingH-VH,target));
  G.camY+=(target-G.camY)*Math.min(1,dt*5);
}

/* ---------- drawing helpers ---------- */
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }
function glow(x,y,r,c0){
  const g=ctx.createRadialGradient(x,y,1,x,y,r);
  g.addColorStop(0,c0); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(x-r,y-r,r*2,r*2);
}
function sy(worldY){ return Math.round(VH-50-(worldY-G.camY)); } // screen y of a world height
const BX=100, BW=400;            // building x/width
const SHX=BX+BW-124, SHW=104;    // shaft
const HALLX=BX+12;

/* ---------- people: ~14w x 27h, shaded ---------- */
function drawPerson(x,y,p,frame){
  x=Math.round(x); y=Math.round(y);
  const step=frame%2, bob=step?1:0;
  const [cA,cB,cC]=p.coat, [sk,skS]=p.skin;
  // shadow
  px(x,y-1,14,2,'rgba(0,0,0,.35)');
  // legs & shoes
  if(p.gown){ /* floor-length — no legs */ }
  else if(p.lady&&!p.pants){
    px(x+3,y-9,8,4,cB);                                    // skirt hem
    px(x+4,y-5,2,4,'#c9b8a0'); px(x+8,y-5+(step?-1:0),2,4+(step?1:0),'#c9b8a0');
    px(x+3,y-2,3,2,'#1d1814'); px(x+8,y-2+(step?-1:0),3,2,'#1d1814');
  } else {
    px(x+3,y-9,4,8,cB); px(x+7,y-9+(step?-1:0),4,8+(step?1:0),cB);
    px(x+4,y-9,1,7,cC);                                    // trouser crease
    px(x+2,y-2,4,2,'#1d1814'); px(x+8,y-2+(step?-1:0),4,2,'#1d1814');
  }
  // torso / coat (3-tone)
  const ty=y-19-bob;
  if(p.lady){
    px(x+2,ty,10,11,cA); px(x+2,ty,3,11,cC); px(x+9,ty,3,11,cB);   // dress
    px(x+1,ty+2,2,6,cA); px(x+11,ty+2,2,6,cB);                     // arms
    px(x+5,ty+4,4,1,cC);                                           // waist sash
    if(p.gown){ px(x+2,ty+11,10,6+bob,cA); px(x+1,y-4,12,2,cB); }  // train to the floor
  } else {
    px(x+2,ty,10,10,cA); px(x+2,ty,3,10,cC); px(x+9,ty,3,10,cB);   // coat
    px(x+1,ty+1,2,7,cA); px(x+11,ty+1,2,7,cB);                     // arms
    if(!p.arch){ px(x+6,ty,2,4,'#e9e2d2'); px(x+6,ty+3,2,3,P.rust); // shirt + tie
                 px(x+4,ty,2,2,cC); px(x+8,ty,2,2,cB); }            // lapels
  }
  if(p.bag){ px(x+12,ty+7,4,5,'#4a3120'); px(x+13,ty+6,2,1,'#2a2018'); }
  // head
  const hy=ty-7;
  px(x+4,hy,6,7,sk); px(x+8,hy+1,2,6,skS);
  // hair / hat (named characters bring their own)
  if(p.arch){ /* décor below */ }
  else if(p.hat&&!p.lady){ px(x+3,hy-3,8,3,'#1d1814'); px(x+2,hy,10,1,'#1d1814'); px(x+3,hy-2,8,1,'#3a3430'); }
  else if(p.lady){ px(x+3,hy-2,8,4,p.hair); px(x+3,hy+2,2,3,p.hair); px(x+9,hy+2,2,3,p.hair);
    px(x+3,hy-3,8,2,'#7a3b50'); px(x+10,hy-1,2,2,'#7a3b50'); }     // cloche hat
  else { px(x+3,hy-2,8,3,p.hair); px(x+3,hy,1,3,p.hair); }
  // face
  const g=p.grump;
  px(x+5,hy+2,1,1,'#1d1814'); px(x+7,hy+2,1,1,'#1d1814');          // eyes
  if(g>0.55){ px(x+5,hy+1,2,1,g>0.8?P.bad:'#5a4232'); px(x+7,hy+1,2,1,g>0.8?P.bad:'#5a4232'); } // brows
  if(g>0.8){ px(x+4,hy+4,2,1,'#d5745f'); px(x+8,hy+4,2,1,'#d5745f'); }                          // flushed cheeks
  if(g>0.85 && Math.floor(G.t*6)%2===0){
    px(x+11,hy-4,2,2,'rgba(255,255,255,.55)'); px(x+13,hy-8,3,3,'rgba(255,255,255,.35)');
    px(x+10,hy-9,2,2,'rgba(255,255,255,.25)');
  }
  if(p.arch) drawArchDecor(x,y,ty,hy,p,step);
}

function moodColor(g){ return g<0.5?P.ok:(g<0.8?P.warn:P.bad); }
function bubble(x,y,txt,g){

/* ---------- floors ---------- */
function decoPattern(style,x,y,w,h){
  ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  const a='rgba(255,255,255,.06)', b='rgba(0,0,0,.14)';
  if(style===0){ for(let i=x;i<x+w;i+=24){ for(let j=0;j<3;j++){ px(i+j*4,y+6+j*3,12,2,b); px(i+j*4+1,y+5+j*3,12,1,a);} } }
  else if(style===1){ for(let i=x;i<x+w;i+=20){ px(i+4,y+4,2,h-24,b); px(i+10,y+8,2,h-32,a); } }
  else if(style===2){ for(let i=x;i<x+w;i+=26){ for(let j=0;j<4;j++){ px(i+6+j*3,y+4+j*4,10-j*2,2,b);} px(i+8,y+2,6,2,a); } }
  else { for(let i=x;i<x+w;i+=22){ px(i+4,y+6,2,10,b); px(i+8,y+3,2,13,a); px(i+12,y+6,2,10,b); } }
  ctx.restore();
}

function drawFloor(f){
  const yb=sy(f*FLOOR_H);                    // baseline (walkable)
  const yt=yb-FLOOR_H;
  if(yb<-10||yt>VH+10) return;
  const th=f===0?['#5a4a28','#4c3e21','#c9a227','#3a3018']:THEMES[((f%THEMES.length)+THEMES.length)%THEMES.length];
  if(f<0){ drawBasementDecor(f,yt,yb); }
  else {
  // wall with vertical light falloff
  const wg=ctx.createLinearGradient(0,yt,0,yb);
  wg.addColorStop(0,th[1]); wg.addColorStop(.4,th[0]); wg.addColorStop(1,th[0]);
  ctx.fillStyle=wg; ctx.fillRect(BX,yt,BW,FLOOR_H);
  decoPattern(f%4,BX,yt,BW,FLOOR_H-26);
  // ceiling molding + wainscot
  px(BX,yt,BW,3,th[3]); px(BX,yt+3,BW,1,'rgba(255,255,255,.12)');
  px(BX,yb-24,BW,2,th[2]); px(BX,yb-22,BW,16,th[3]);
  for(let x=BX+6;x<BX+BW-8;x+=26) px(x,yb-19,18,10,'rgba(255,255,255,.05)');

    px(BX,yt+6,BW,2,P.brass); px(BX,yb-27,BW,3,P.brass);
    for(let x=BX+22;x<SHX-30;x+=76){                       // marble columns
      px(x,yt+8,12,FLOOR_H-14,'#d8cdb4'); px(x,yt+8,3,FLOOR_H-14,'#f0e8d4');
      px(x+9,yt+8,3,FLOOR_H-14,'#b3a78c'); px(x-3,yt+6,18,4,P.brass); px(x-3,yb-10,18,4,P.brass);
    }
    // chandelier
    const chx=BX+150;
    px(chx-1,yt+3,2,8,P.brassLo);
    px(chx-10,yt+11,20,3,P.brass); px(chx-6,yt+14,12,3,P.brassHi);

    px(chx-12,yt+13,2,3,'#ffd970'); px(chx+10,yt+13,2,3,'#ffd970'); px(chx-1,yt+16,2,3,'#ffe9a8');
    // red carpet
    px(BX+8,yb-8,SHX-BX-20,5,'#7a2a22'); px(BX+8,yb-8,SHX-BX-20,1,'#a34a3c');
  }
  // sconce with glow
  px(HALLX+4,yt+26,6,10,P.brass); px(HALLX+5,yt+23,4,4,'#ffd970');
  glow(HALLX+7,yt+26,18,'rgba(255,217,112,.28)');
  }
  // slab (floor plate)
  px(BX,yb-6,BW,6,P.slab); px(BX,yb-6,BW,1,P.slabHi); px(BX,yb-1,BW,1,P.slabLo);
  // call panel by the shaft
  px(SHX-14,yt+34,6,9,'#221c14'); px(SHX-13,yt+36,4,2,waitersAt(f).length?'#ffd970':'#4a3f2a');
  // floor plaque

  px(SHX-37,yt+19,24,14,P.brass); px(SHX-36,yt+20,22,12,'#221c14'); px(SHX-35,yt+21,20,10,P.brass);
  ctx.fillStyle='#1d1814'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText(floorName(f),SHX-25,yt+30);
  // waiting queue
  const q=waitersAt(f);
  q.forEach((p,i)=>{
    const targetX=SHX-58-i*24;
    if(p.x===0)p.x=HALLX-14;
    p.x+=(targetX-p.x)*0.06; p.walk+=Math.abs(targetX-p.x)>1?0.2:0;

  px(carX+carW/2-9,topY,2,cy-carH-6-topY,'#5a5248'); px(carX+carW/2+7,topY,2,cy-carH-6-topY,'#5a5248');
  px(carX+carW/2-9,topY,1,cy-carH-6-topY,'#7a7268'); px(carX+carW/2+7,topY,1,cy-carH-6-topY,'#7a7268');
  // crossbeam + housing
  px(carX-5,cy-carH-8,carW+10,6,P.brassLo); px(carX-5,cy-carH-8,carW+10,2,P.brass);
  // interior (warm light)
  const ig=ctx.createLinearGradient(0,cy-carH,0,cy);
  ig.addColorStop(0,'#3d3120'); ig.addColorStop(.5,'#57452a'); ig.addColorStop(1,'#2e2517');
  ctx.fillStyle=ig; ctx.fillRect(carX,cy-carH,carW,carH-5);
  glow(carX+carW/2,cy-carH+10,30,'rgba(255,220,150,.20)');
  px(carX+carW/2-4,cy-carH+2,8,3,'#ffe9a8');                       // ceiling lamp
  // wood paneling
  for(let x=carX+3;x<carX+carW-4;x+=12) px(x,cy-26,9,20,'rgba(0,0,0,.15)');
  px(carX,cy-carH,carW,2,P.brassHi);
  // riders inside
  const rs=riders();
  rs.forEach((p,i)=>{
    const rx=carX+5+i*((carW-22)/Math.max(1,G.cap-1||1));
    drawPerson(rx,cy-7,p,0);
    ctx.fillStyle=p.angry?P.bad:P.cream; ctx.font='9px monospace'; ctx.textAlign='center';
    ctx.fillText(floorName(p.dest),rx+7,cy-carH+13);
  });
  // doorway transfer walker
  if(G.transfer){
    const p=G.transfer, prog=1-G.transferT/(G.transferDur||0.45);
    const fromX=p.state==='boarding'?SHX-20:carX+carW/2, toX=p.state==='boarding'?carX+carW/2:SHX-26;
    drawPerson(fromX+(toX-fromX)*prog,cy-7,p,Math.floor(G.t*10));
  }
  // car frame + kick plate
  px(carX-2,cy-6,carW+4,4,'#6b531f'); px(carX-4,cy-3,carW+8,3,P.brassLo);
  px(carX-2,cy-6,carW+4,1,P.brass);
  // accordion gate (scissor lattice)
  const open=G.doorT, gw=Math.round(carW*(1-open));
  if(gw>2){
    ctx.save(); ctx.beginPath(); ctx.rect(carX,cy-carH+3,gw,carH-11); ctx.clip();
    for(let x=0;x<gw;x+=6){ px(carX+x,cy-carH+3,2,carH-11,P.brass); px(carX+x,cy-carH+3,1,carH-11,P.brassHi); }
    ctx.strokeStyle=P.brassLo; ctx.lineWidth=1; ctx.beginPath();
    for(let x=-carH;x<gw;x+=12){
      ctx.moveTo(carX+x,cy-carH+3); ctx.lineTo(carX+x+carH,cy-8);
      ctx.moveTo(carX+x+carH,cy-carH+3); ctx.lineTo(carX+x,cy-8);
    }
    ctx.stroke();
    px(carX,cy-carH+30,gw,2,P.brassLo);
    ctx.restore();
  }
  // shaft brass edges
  px(SHX-3,topY,3,botY-topY,P.brassLo); px(SHX+SHW,topY,3,botY-topY,P.brassLo);
  px(SHX-3,topY,1,botY-topY,P.brass); px(SHX+SHW+2,topY,1,botY-topY,P.brass);
}

/* ---------- backdrop ---------- */
function drawBackdrop(){
  const g=ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,'#0a0912'); g.addColorStop(.6,'#141019'); g.addColorStop(1,'#1c130f');
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  // stars
  for(let i=0;i<70;i++){
    const x=(i*137)%VW, y=(i*211+((i%5)*77))%(VH-80);
    if((i+Math.floor(G.t))%11>0) px(x,y,1,1,'rgba(244,232,207,'+(i%3?.22:.4)+')');
  }
  // moon: lives in the far background, drifting gently with the camera
  const par=G.camY*0.25;
  const moonY=96+par*0.2;
  glow(VW-88,moonY+10,34,'rgba(240,232,210,.16)');
  px(VW-96,moonY,16,16,'#e8e0cc'); px(VW-94,moonY+2,5,5,'#cfc7b2'); px(VW-88,moonY+8,4,4,'#cfc7b2');
  // city skyline, slight parallax
  const sk=[[0,120,34],[30,88,26],[58,140,30],[86,70,22],[470,110,40],[512,150,34],[548,92,30],[580,130,44]];
  for(const [bx,bh,bw] of sk){
    const byTop=VH-46-bh+par*0.3;
    px(bx,byTop,bw,VH-byTop,'#191420');
    px(bx,byTop,bw,2,'#241d2e');
    for(let wx=bx+4;wx<bx+bw-4;wx+=8) for(let wy=byTop+6;wy<VH-60;wy+=12)
      if(((wx*7+wy*13)%17)<4) px(wx,wy,3,4,'rgba(255,214,120,.34)');
  }
}

function drawBuilding(){
  drawBackdrop();
  for(let f=-G.base;f<G.floors;f++) drawFloor(f);
  // roof / construction of next floor
  const ry=sy(G.floors*FLOOR_H);
  if(ry>-30){
    px(BX-6,ry-6,BW+12,8,P.slab); px(BX-6,ry-6,BW+12,2,P.slabHi);
    px(BX+14,ry-30,5,24,'#4a3b2c'); px(BX+BW-80,ry-30,5,24,'#4a3b2c');
    px(BX+6,ry-33,BW-58,4,'#4a3b2c'); px(BX+6,ry-33,BW-58,1,'#6b5844');
    for(let x=BX+30;x<BX+BW-90;x+=34) px(x,ry-29,2,23,'#3a2e22');
    ctx.fillStyle='rgba(244,232,207,.4)'; ctx.font='10px monospace'; ctx.textAlign='left';
    ctx.fillText('FLOOR '+floorName(G.floors)+' — OPENING SOON  ('+(G.nextFloorAt-G.delivered)+' GUESTS TO GO)',BX+18,ry-40);
  }
  // outer wall faces (down through the cellars)
  const wallBot=sy(-G.base*FLOOR_H-14);
  px(BX-6,sy(G.floors*FLOOR_H)-6,6,wallBot-sy(G.floors*FLOOR_H)+6,'#1b1512');
  px(BX-6,sy(G.floors*FLOOR_H)-6,2,wallBot-sy(G.floors*FLOOR_H)+6,'#2a221c');
  drawShaft();
  // dispatcher target marker: pulsing chevron beside the shaft
  if(G.scheme==='dispatch'&&G.autoTarget!==null){
    const tym=sy(G.autoTarget*FLOOR_H), pulse=Math.floor(G.t*4)%2;
    px(SHX-12-pulse*2,tym-14,8,3,P.warn); px(SHX-10-pulse*2,tym-11,6,3,P.warn); px(SHX-8-pulse*2,tym-8,4,3,P.warn);
  }
  // street flanks the building; below it, bedrock wraps the cellars
  const gy=sy(0);
  if(gy<VH){
    px(0,gy,BX-6,VH-gy,'#12100d'); px(BX+BW,gy,VW-BX-BW,VH-gy,'#12100d');
    px(0,gy-1,BX-6,2,'#000'); px(BX+BW,gy-1,VW-BX-BW,2,'#000');
    px(0,gy+8,BX-6,2,'#1f1b16'); px(BX+BW,gy+8,VW-BX-BW,2,'#1f1b16');
    for(let x=8;x<BX-30;x+=52) px(x,gy+4,26,2,'#241f18');
    for(let x=BX+BW+8;x<VW-26;x+=52) px(x,gy+4,26,2,'#241f18');
  }
  const rockY=sy(-G.base*FLOOR_H);
  px(BX-6,rockY,BW+12,Math.max(0,VH-rockY),'#0a0806');
}

/* ---------- HUD ---------- */
function drawDial(){
  const cx=VW/2, cyd=46, R=38;
  // brass casing
  const bg=ctx.createLinearGradient(cx-R,cyd-R,cx+R,cyd);
  bg.addColorStop(0,P.brassHi); bg.addColorStop(.5,P.brass); bg.addColorStop(1,P.brassLo);
  ctx.fillStyle='#141110'; ctx.beginPath(); ctx.arc(cx,cyd,R+9,Math.PI,0); ctx.fill();
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cyd,R+6,Math.PI,0); ctx.fill();
  ctx.fillStyle='#221c14'; ctx.beginPath(); ctx.arc(cx,cyd,R,Math.PI,0); ctx.fill();
  const fg=ctx.createLinearGradient(0,cyd-R,0,cyd);
  fg.addColorStop(0,'#2e2618'); fg.addColorStop(1,'#191510');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(cx,cyd,R-2,Math.PI,0); ctx.fill();
  px(cx-R-14,cyd,R*2+28,4,P.brass); px(cx-R-14,cyd,R*2+28,1,P.brassHi);
  const top=G.floors-1, lo=-G.base, span=Math.max(1,top-lo);
  for(let f=lo;f<G.floors;f++){
    const a=Math.PI+((f-lo)/span)*Math.PI;
    const tx=cx+Math.cos(a)*(R-9), ty=cyd+Math.sin(a)*(R-9);
    ctx.fillStyle=f<0?'#c98a5a':P.cream; ctx.font='9px monospace'; ctx.textAlign='center';
    if(G.floors<=12||f%2===0||f===top||f<0) ctx.fillText(floorName(f),tx,ty+3);
    const ox=cx+Math.cos(a)*(R-3), oy=cyd+Math.sin(a)*(R-3);
    px(ox-1,oy-1,2,2,P.brassLo);
  }
  const a=Math.PI+((G.pos-lo)/span)*Math.PI;
  ctx.strokeStyle=P.rust; ctx.lineWidth=3; ctx.beginPath();
  ctx.moveTo(cx-Math.cos(a)*6,cyd-Math.sin(a)*6); ctx.lineTo(cx+Math.cos(a)*(R-6),cyd+Math.sin(a)*(R-6)); ctx.stroke();
  ctx.strokeStyle='#e0785f'; ctx.lineWidth=1; ctx.beginPath();
  ctx.moveTo(cx,cyd); ctx.lineTo(cx+Math.cos(a)*(R-7),cyd+Math.sin(a)*(R-7)); ctx.stroke();
  px(cx-3,cyd-3,6,4,P.brassHi); px(cx-2,cyd-2,3,2,'#fff8e0');
  // flush lamp
  const ok=flushFloor()!==-99;
  px(cx+R+18,cyd-13,12,12,ok?P.ok:'#332a20');
  if(ok) glow(cx+R+24,cyd-7,12,'rgba(127,191,106,.5)');
  ctx.strokeStyle=P.brassLo; ctx.strokeRect(cx+R+17.5,cyd-13.5,13,13);
  ctx.fillStyle=P.cream; ctx.font='8px monospace'; ctx.textAlign='center'; ctx.fillText('FLUSH',cx+R+24,cyd+9);
  // fine alignment gauge
  const off=G.pos-Math.round(G.pos), tol=0.085*(1+0.25*upLv('magnet'));
  px(cx-R-58,cyd-11,34,10,'#141110'); ctx.strokeStyle=P.brassLo; ctx.strokeRect(cx-R-58.5,cyd-11.5,35,11);
  px(cx-R-42,cyd-10,2,8,'#4a3f2a');
  px(cx-R-58+16+Math.round(off*140),cyd-9,4,6,Math.abs(off)<tol?P.ok:P.warn);
  ctx.fillStyle=P.cream; ctx.fillText('LEVEL',cx-R-41,cyd+9);
}
function plaque(x,y,w,h){
  px(x,y,w,h,'rgba(13,11,9,.78)');
  px(x,y,w,1,P.brassLo); px(x,y+h-1,w,1,P.brassLo); px(x,y,1,h,P.brassLo); px(x+w-1,y,1,h,P.brassLo);
}
function drawHUD(){
  ctx.font='11px monospace';
  plaque(8,8,132,52);
  ctx.fillStyle=P.brassHi; ctx.textAlign='left';
  ctx.fillText('TIPS  $'+G.tips.toFixed(2),16,24);
  ctx.fillStyle=P.cream;
  ctx.fillText('CAR   '+riders().length+'/'+G.cap,16,39);
  ctx.fillText('BEST  FL '+floorName(G.maxFloor),16,54);
  // strikes (lamp count grows with Manager's Favor)
  const ns=maxStrikes(), sw=ns*24+16, sx=VW-8-sw;
  plaque(sx,8,sw,34);
  for(let i=0;i<ns;i++){
    px(sx+12+i*24,14,14,14,i<G.strikes?P.bad:'#2a231c');
    if(i<G.strikes) glow(sx+19+i*24,21,10,'rgba(213,83,60,.5)');
    ctx.strokeStyle=P.brassLo; ctx.strokeRect(sx+12.5+i*24,13.5,15,15);
  }
  ctx.fillStyle=P.cream; ctx.font='8px monospace'; ctx.textAlign='center'; ctx.fillText('STRIKES',sx+sw/2,38);
  drawDial();
  // minimap
  const mx=VW-26,mh=VH-120,my=64;
  px(mx-4,my-4,20,mh+8,'rgba(13,11,9,.8)');
  ctx.strokeStyle=P.brassLo; ctx.strokeRect(mx-4.5,my-4.5,21,mh+9);
  px(mx+5,my,2,mh,P.rail);
  const mlo=-G.base, mspan=Math.max(1,G.floors-1-mlo);
  for(let f=mlo;f<G.floors;f++){
    const y=my+mh-((f-mlo)/mspan)*mh;
    px(mx,y-1,12,2,f<0?'#4a3320':P.rail);
    const q=waitersAt(f);
    if(q.length){ const worst=Math.max(...q.map(p=>p.grump)); px(mx,y-6,Math.min(12,q.length*3),4,moodColor(worst)); }
  }
  const cy2=my+mh-((G.pos-mlo)/mspan)*mh;
  px(mx+2,cy2-4,8,8,P.brassHi); px(mx+4,cy2-2,4,4,P.brass);
  // message banner
  if(G.msgT>0&&G.msg){
    ctx.font='11px monospace';
    const w=G.msg.length*7+36;
    px(VW/2-w/2,VH-44,w,24,'rgba(13,11,9,.88)');
    px(VW/2-w/2,VH-44,w,2,P.brass); px(VW/2-w/2,VH-22,w,2,P.brass);
    px(VW/2-w/2-6,VH-38,4,12,P.brass); px(VW/2+w/2+2,VH-38,4,12,P.brass);
    ctx.fillStyle=P.brassHi; ctx.textAlign='center'; ctx.fillText(G.msg,VW/2,VH-28);
  }
}

function drawOverlay(title,lines){
  ctx.fillStyle='rgba(13,11,9,.9)'; ctx.fillRect(0,0,VW,VH);
  ctx.strokeStyle=P.brass; ctx.lineWidth=2; ctx.strokeRect(46,42,VW-92,VH-84);
  ctx.strokeStyle=P.brassLo; ctx.lineWidth=1; ctx.strokeRect(52,48,VW-104,VH-96);
  // deco corners
  for(const [cx2,cy3,dx,dy] of [[46,42,1,1],[VW-46,42,-1,1],[46,VH-42,1,-1],[VW-46,VH-42,-1,-1]]){
    ctx.fillStyle=P.brass;
    ctx.beginPath(); ctx.moveTo(cx2,cy3); ctx.lineTo(cx2+dx*22,cy3); ctx.lineTo(cx2,cy3+dy*22); ctx.fill();
    ctx.fillStyle='#0d0b09';
    ctx.beginPath(); ctx.moveTo(cx2,cy3); ctx.lineTo(cx2+dx*12,cy3); ctx.lineTo(cx2,cy3+dy*12); ctx.fill();
  }
  ctx.fillStyle=P.brassHi; ctx.font='26px Limelight, monospace'; ctx.textAlign='center';
  ctx.fillText(title,VW/2,96);
  px(VW/2-90,108,180,1,P.brassLo); px(VW/2-50,111,100,1,P.brassLo);
  ctx.font='12px monospace'; ctx.fillStyle=P.cream;
  lines.forEach((l,i)=>ctx.fillText(l,VW/2,136+i*20));
  if(Math.floor(G.t*2)%2===0){
    ctx.fillStyle=P.brass; ctx.font='12px monospace';
    ctx.fillText(G.state==='title'?'— PRESS 1, 2 OR 3 TO CLOCK IN —':
                 G.state==='pause'?'— PRESS ESC TO RESUME —':'— PRESS ENTER FOR A NEW SHIFT —',VW/2,VH-66);
  }
}

function drawPickOverlay(){
  ctx.fillStyle='rgba(13,11,9,.82)'; ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle=P.brassHi; ctx.font='20px Limelight, monospace'; ctx.textAlign='center';
  ctx.fillText('FLOOR '+floorName(G.floors-1)+' NOW OPEN',VW/2,86);
  ctx.font='11px monospace'; ctx.fillStyle=P.cream;
  ctx.fillText('THE MANAGER OFFERS AN IMPROVEMENT — CHOOSE ONE',VW/2,110);
  const cw=210, ch=124, cy0=140;
  (G.offers||[]).forEach((id,i)=>{
    const u=UPGRADES[id], x=VW/2+(i===0?-cw-14:14), sel=G.pickSel===i;
    px(x,cy0,cw,ch,sel?'rgba(46,38,24,.95)':'rgba(20,17,14,.95)');
    ctx.strokeStyle=sel?P.brassHi:P.brassLo; ctx.lineWidth=sel?2:1;
    ctx.strokeRect(x+.5,cy0+.5,cw-1,ch-1);
    if(sel){ ctx.strokeStyle=P.brass; ctx.strokeRect(x+4.5,cy0+4.5,cw-9,ch-9); }
    ctx.fillStyle=sel?P.brassHi:P.brass; ctx.font='15px Limelight, monospace'; ctx.textAlign='center';
    ctx.fillText(u.name,x+cw/2,cy0+38);
    px(x+cw/2-40,cy0+50,80,1,P.brassLo);
    ctx.fillStyle=P.cream; ctx.font='11px monospace';
    ctx.fillText(u.desc,x+cw/2,cy0+72);
    // level pips
    for(let k=0;k<u.max;k++){
      const owned=k<upLv(id);
      px(x+cw/2-(u.max*12)/2+k*12,cy0+90,8,8,owned?P.brass:'#2a231c');
      ctx.strokeStyle=P.brassLo; ctx.strokeRect(x+cw/2-(u.max*12)/2+k*12+.5,cy0+90.5,8,8);
    }
    ctx.fillStyle=sel?P.brassHi:'rgba(244,232,207,.5)'; ctx.font='10px monospace';
    ctx.fillText('PRESS '+(i+1),x+cw/2,cy0+ch-10);
  });
  if(Math.floor(G.t*2)%2===0){
    ctx.fillStyle=P.brass; ctx.font='11px monospace';
    ctx.fillText('←/→ CHOOSE  ·  ENTER TO INSTALL',VW/2,cy0+ch+34);
  }
}

function drawDevMenu(){
  ctx.fillStyle='rgba(13,11,9,.86)'; ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle=P.brassHi; ctx.font='18px Limelight, monospace'; ctx.textAlign='center';
  ctx.fillText('DEV — UPGRADE EDITOR',VW/2,74);
  ctx.font='10px monospace'; ctx.fillStyle=P.cream;
  ctx.fillText('CLICK A ROW TO CYCLE ITS LEVEL  ·  U OR ESC TO CLOSE',VW/2,94);
  const keys2=Object.keys(UPGRADES);
  keys2.forEach((id,i)=>{
    const u=UPGRADES[id], ry=118+i*24;
    px(VW/2-150,ry-14,300,20,'rgba(30,25,20,.9)');
    ctx.strokeStyle=P.brassLo; ctx.strokeRect(VW/2-150.5,ry-14.5,301,21);
    ctx.fillStyle=P.brass; ctx.font='10px monospace'; ctx.textAlign='left';
    ctx.fillText(u.name,VW/2-140,ry);
    for(let k=0;k<u.max;k++){
      px(VW/2+60+k*14,ry-8,10,10,k<upLv(id)?P.brass:'#2a231c');
      ctx.strokeStyle=P.brassLo; ctx.strokeRect(VW/2+60.5+k*14,ry-8.5,10,10);
    }
  });
  ctx.fillStyle='rgba(244,232,207,.6)'; ctx.textAlign='center';
  ctx.fillText('FLOORS '+G.floors+'  ·  BASEMENTS '+G.base+'  ·  CAP '+G.cap+'  ·  N/M SPAWN GUESTS IN PLAY',VW/2,118+keys2.length*24+6);
}

function draw(){
  ctx.save();
  if(G.shake>0) ctx.translate(rnd(4)-2,rnd(4)-2);
  drawBuilding();
  drawHUD();
  ctx.restore();
  if(G.dev&&G.state!=='devmenu'){
    ctx.fillStyle=P.bad; ctx.font='10px monospace'; ctx.textAlign='center';
    ctx.fillText('· DEV ·',VW/2,VH-8);
  }
  if(G.state==='devmenu'){ drawDevMenu(); }
  else if(G.state==='pick'){ drawPickOverlay(); }
  else if(G.state==='pause'){
    drawOverlay('INTERMISSION',[
      'The car rests between floors.',
      '',
      'Guests are frozen in time — even the grumpy ones.',
    ]);
  }
  else if(G.state==='title'){
    drawOverlay('THE GRAND ASCENT',[
      'Deliver guests before they boil over — 3 walk-outs and',
      'the management lets you go. Happy guests tip; deliveries',
      'open new floors, each adding one improvement you choose.',
      '',
      'CHOOSE YOUR CONTROLS TO CLOCK IN:',
      '1 — CLASSIC    arrows drive the lever, space works the gate',
      '2 — WHEEL      scroll shoves the car, space works the gate',
      '3 — DISPATCH   click a floor, the car drives itself',
      '',
      'BEST: FLOOR '+floorName(G.hs.floor)+'  ·  $'+G.hs.tips.toFixed(2),
    ]);
  } else if(G.state==='over'){
    drawOverlay('SHIFT TERMINATED',[
      'The revolving door hits you on the way out.',
      '',
      'HIGHEST FLOOR REACHED:  '+floorName(G.maxFloor),
      'TIPS EARNED:  $'+G.tips.toFixed(2),
      'GUESTS DELIVERED:  '+G.delivered,
      '',
      'HOUSE BEST: FLOOR '+floorName(G.hs.floor)+'  ·  $'+G.hs.tips.toFixed(2),
    ]);
  }
}

/* ---------- loop ---------- */
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt); draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
