<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Grand Ascent — Lift Operator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Jost:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#151210; --panel:#1e1a16; --brass:#c9a227; --brass-hi:#f0d68a;
    --jade:#2e6f5e; --cream:#f4e8cf; --rust:#a63d2f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--ink);
    background-image:
      repeating-linear-gradient(45deg, transparent 0 34px, rgba(201,162,39,.05) 34px 36px),
      repeating-linear-gradient(-45deg, transparent 0 34px, rgba(201,162,39,.05) 34px 36px);
    color:var(--cream);
    font-family:'Jost',sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;overflow:hidden;user-select:none;
  }
  h1{
    font-family:'Limelight',cursive;font-weight:400;color:var(--brass);
    font-size:clamp(20px,3.4vh,34px);letter-spacing:.14em;text-align:center;line-height:1;
    text-shadow:0 0 18px rgba(201,162,39,.35), 0 2px 0 #000;
  }
  h1 small{display:block;font-family:'Jost',sans-serif;font-size:.38em;letter-spacing:.55em;
    color:var(--cream);opacity:.7;margin-top:6px;text-transform:uppercase}
  .marquee{
    padding:10px;border:2px solid var(--brass);outline:2px solid #4a3a12;outline-offset:3px;
    background:linear-gradient(180deg,#26211b,#191512);
    box-shadow:0 0 0 8px var(--panel), 0 24px 60px rgba(0,0,0,.7);
    position:relative;
  }
  .marquee::before,.marquee::after{
    content:"";position:absolute;top:-2px;bottom:-2px;width:10px;
    background:repeating-linear-gradient(180deg,var(--brass) 0 6px,transparent 6px 14px);
    opacity:.9;
  }
  .marquee::before{left:-14px}.marquee::after{right:-14px}
  canvas{display:block;image-rendering:pixelated;background:#0d0b09}
  .legend{display:flex;gap:26px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;opacity:.85}
  .legend b{
    font-family:inherit;border:1px solid var(--brass);border-radius:4px;padding:1px 8px;
    color:var(--brass-hi);background:#000;margin-right:6px;font-weight:600;
  }
</style>
</head>
<body>
  <h1>THE GRAND ASCENT<small>hotel lift operator · est. 1926</small></h1>
  <div class="marquee"><canvas id="cv"></canvas></div>
  <div class="legend">
    <span><b>&uarr;&darr;</b>lever</span>
    <span><b>space</b>gate</span>
    <span><b>enter</b>start over</span>
  </div>
<script>
"use strict";
/* ================= THE GRAND ASCENT =================
   Single-file pixel prototype. All art programmatic. */

const VW=480, VH=300, FLOOR_H=52;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let SCALE=2;
function fit(){
  SCALE=Math.max(1,Math.floor(Math.min((innerWidth-60)/VW,(innerHeight-150)/VH)));
  cv.width=VW; cv.height=VH;
  cv.style.width=VW*SCALE+'px'; cv.style.height=VH*SCALE+'px';
  ctx.imageSmoothingEnabled=false;
}
addEventListener('resize',fit); fit();

/* ---------- palette ---------- */
const P={
  night:'#0d0b09', wallDark:'#241d18', slab:'#3a2e24', slabHi:'#4d3d2f',
  brass:'#c9a227', brassHi:'#f0d68a', brassLo:'#7a5f14',
  jade:'#2e6f5e', jadeHi:'#4a9a83', cream:'#f4e8cf', rust:'#a63d2f',
  shaft:'#141110', rail:'#2c2622', carBody:'#8a6b1f', carHi:'#d8b74a',
  skin:'#e8b98a', skin2:'#c68f5f', ok:'#7fbf6a', warn:'#e0a83c', bad:'#d5533c',
};
const WALLS=['#3d5a52','#5a4a63','#6b4a3c','#44586b','#6b5a3c','#4f6b4a','#63404f','#3c5f6b'];
const COATS=['#5a4a63','#3d5a52','#7a3b30','#44586b','#8a7440','#404a5f','#6b5a3c','#2f4a44'];

/* ---------- audio (synth, created on first input) ---------- */
let AC=null;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function env(g,t,a,d,v){ g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+a); g.gain.exponentialRampToValueAtTime(.0001,t+a+d); }
function tone(freq,type,a,d,v,slide){
  const c=ac(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t+a+d);
  env(g,t,a,d,v); o.connect(g).connect(c.destination); o.start(t); o.stop(t+a+d+.05);
}
function noise(d,v,f){
  const c=ac(),t=c.currentTime,len=c.sampleRate*d,buf=c.createBuffer(1,len,c.sampleRate),ch=buf.getChannelData(0);
  for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
  const s=c.createBufferSource(),g=c.createGain(),lp=c.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=f; s.buffer=buf; env(g,t,.005,d,v);
  s.connect(lp).connect(g).connect(c.destination); s.start(t);
}
const S={
  gate(open){ noise(.14,.25,open?900:600); tone(open?220:170,'square',.005,.1,.06); },
  clank(){ noise(.08,.3,400); tone(90,'square',.005,.12,.12); },
  ding(n=0){ tone(880*Math.pow(1.25,n),'sine',.005,.6,.16); tone(1760*Math.pow(1.25,n),'sine',.005,.3,.05); },
  coin(){ tone(1245,'square',.003,.07,.07); setTimeout(()=>tone(1660,'square',.003,.2,.07),60); },
  huff(){ noise(.22,.22,300); tone(140,'sawtooth',.02,.18,.05,80); },
  fanfare(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.01,.35,.12),i*110)); },
  denied(){ tone(120,'square',.005,.09,.08); },
};

/* ---------- state ---------- */
const HS_KEY='grandAscentHS';
let G;
function reset(){
  G={
    state:'title', t:0,
    pos:0, vel:0,               // pos in floor units, 0 = lobby
    floors:6, cap:4,
    doorT:0, doorOpen:false,    // doorT 0..1 openness
    transfer:null, transferT:0, // passenger mid-doorway
    pax:[], spawnT:3, spawnId:0,
    tips:0, delivered:0, nextFloorAt:8, strikes:0,
    maxFloor:0, camY:0, msg:null, msgT:0, shake:0,
    hs:JSON.parse(localStorage.getItem(HS_KEY)||'{"floor":0,"tips":0}'),
  };
}
reset();

function say(txt,t=2.4){ G.msg=txt; G.msgT=t; }
function floorName(f){ return f===0?'L':''+(f+0); }

/* ---------- passengers ---------- */
function rnd(n){ return Math.floor(Math.random()*n); }
function spawnPassenger(){
  const top=G.floors-1;
  let from,dest,r=Math.random();
  if(r<0.5){ from=0; dest=1+rnd(top); }
  else if(r<0.85){ from=1+rnd(top); dest=0; }
  else { from=rnd(G.floors); do{dest=rnd(G.floors);}while(dest===from); }
  G.pax.push({
    id:G.spawnId++, from, dest, state:'waiting',
    grump:0, angry:false, struck:false,
    x:0, walk:0, coat:COATS[rnd(COATS.length)],
    hat:Math.random()<.6, lady:Math.random()<.4, skin:Math.random()<.5?P.skin:P.skin2,
  });
}
function waitersAt(f){ return G.pax.filter(p=>p.state==='waiting'&&p.from===f); }
function riders(){ return G.pax.filter(p=>p.state==='riding'); }

function strike(p){
  if(p.struck) return;
  p.struck=true; G.strikes++; G.shake=.35; S.huff();
  say(G.strikes>=3?'THE MANAGEMENT HAS SEEN ENOUGH':'A GUEST STORMS OFF!  ('+G.strikes+'/3)');
  if(G.strikes>=3){
    G.state='over';
    if(G.maxFloor>G.hs.floor||(G.maxFloor===G.hs.floor&&G.tips>G.hs.tips)){
      G.hs={floor:G.maxFloor,tips:G.tips};
      localStorage.setItem(HS_KEY,JSON.stringify(G.hs));
    }
  }
}

/* ---------- update ---------- */
const keys={};
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if(keys[e.code]) return; keys[e.code]=true; ac();
  if(G.state==='title'&&(e.code==='Space'||e.code==='Enter')){ G.state='play'; say('GOOD MORNING, OPERATOR',2.5); return; }
  if(G.state==='over'&&e.code==='Enter'){ reset(); G.state='play'; return; }
  if(G.state!=='play') return;
  if(e.code==='Space') toggleGate();
});
addEventListener('keyup',e=>keys[e.code]=false);

function flushFloor(){
  const f=Math.round(G.pos);
  if(f<0||f>=G.floors) return -1;
  return (Math.abs(G.pos-f)<0.085 && Math.abs(G.vel)<0.3) ? f : -1;
}
function toggleGate(){
  if(G.doorOpen){
    if(G.transfer){ S.denied(); return; }             // someone in the doorway
    G.doorOpen=false; S.gate(false);
    // snub: whoever is left waiting here takes it personally
    const f=Math.round(G.pos), full=riders().length>=G.cap;
    waitersAt(f).forEach(p=>p.grump=Math.min(1.2,p.grump+(full?0.25:0.12)));
  } else {
    const f=flushFloor();
    if(f<0){ S.denied(); say('LINE UP THE CAR, OPERATOR!',1.2); return; }
    G.doorOpen=true; G.vel=0; G.pos=f; S.gate(true);
    if(f>G.maxFloor) G.maxFloor=f;
  }
}

function update(dt){
  G.t+=dt;
  if(G.msgT>0) G.msgT-=dt;
  if(G.shake>0) G.shake-=dt;
  if(G.state!=='play'){ return; }

  /* --- lever & physics --- */
  const locked=G.doorT>0.02;
  let input=0;
  if(!locked){ if(keys.ArrowUp||keys.KeyW)input+=1; if(keys.ArrowDown||keys.KeyS)input-=1; }
  const ACC=3.4, MAX=2.7, DRAG=0.85;
  G.vel+=input*ACC*dt;
  if(!input) G.vel*=Math.exp(-DRAG*dt);          // coast — momentum is the game
  if(!input && Math.abs(G.vel)<0.04) G.vel=0;
  G.vel=Math.max(-MAX,Math.min(MAX,G.vel));
  G.pos+=G.vel*dt;
  const top=G.floors-1;
  if(G.pos<0){ G.pos=0; if(G.vel<-0.5)S.clank(); G.vel=0; }
  if(G.pos>top){ G.pos=top; if(G.vel>0.5)S.clank(); G.vel=0; }

  /* --- gate anim --- */
  G.doorT+=((G.doorOpen?1:0)-G.doorT)*Math.min(1,dt*7);
  if(G.doorOpen&&G.doorT>0.99) G.doorT=1;

  /* --- doorway traffic (one at a time) --- */
  if(G.doorT===1){
    const f=Math.round(G.pos);
    if(G.transfer){
      G.transferT-=dt;
      if(G.transferT<=0){
        const p=G.transfer; G.transfer=null;
        if(p.state==='exiting'){
          p.state='gone';
          if(!p.angry){
            const tip=0.5+4.5*Math.pow(Math.max(0,1-p.grump),1.4);
            G.tips+=tip; G.delivered++; S.coin();
            /* the tower grows */
            if(G.delivered>=G.nextFloorAt){
              G.nextFloorAt+=8; G.floors++;
              G.cap=Math.min(8,4+Math.floor((G.floors-6)/2));
              S.fanfare(); say('FLOOR '+floorName(G.floors-1)+' NOW OPEN'+(G.cap>4?'  ·  CAR HOLDS '+G.cap:''),3);
            }
          }
        }
        else if(p.state==='boarding'){ p.state='riding'; }
      }
    } else {
      const out=riders().find(p=>p.dest===f||p.angry);
      if(out){ out.state='exiting'; G.transfer=out; G.transferT=0.45; }
      else if(riders().length<G.cap){
        const inn=waitersAt(f)[0];
        if(inn){ inn.state='boarding'; G.transfer=inn; G.transferT=0.45; }
      }
    }
  }

  /* --- patience --- */
  const diff=Math.min(1.8,1+G.delivered*0.008);
  for(const p of G.pax){
    if(p.state==='waiting'){
      p.grump+=dt/40*diff;
      if(p.grump>=1&&!p.struck){ p.state='storming'; p.walk=0; strike(p); }
    } else if(p.state==='riding'){
      p.grump+=dt/85*diff;
      if(p.grump>=1&&!p.angry){ p.angry=true; strike(p); say('A GUEST IS FUMING IN THE CAR!',2); }
    } else if(p.state==='storming'){
      p.walk+=dt; if(p.walk>1.6) p.state='gone';
    }
  }
  G.pax=G.pax.filter(p=>p.state!=='gone');

  /* --- spawning --- */
  G.spawnT-=dt;
  if(G.spawnT<=0){
    spawnPassenger();
    const base=Math.max(2.6,7.5-G.delivered*0.09);
    G.spawnT=base*(0.7+Math.random()*0.6);
  }

  /* --- camera --- */
  const buildingH=G.floors*FLOOR_H+40;
  const carWorldY=G.pos*FLOOR_H;
  let target=carWorldY-VH/2+FLOOR_H;
  target=Math.max(-20,Math.min(buildingH-VH,target));
  G.camY+=(target-G.camY)*Math.min(1,dt*5);
}

/* ---------- drawing helpers ---------- */
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),w,h); }
function sy(worldY){ return Math.round(VH-40-(worldY-G.camY)); } // screen y of a world height
const BX=70, BW=280;           // building x/width
const SHX=BX+BW-92, SHW=76;    // shaft
const HALLX=BX+8;

function drawPerson(x,y,p,frame){
  // y = feet baseline. ~10w x 19h
  const c=p.coat, sk=p.skin;
  const leg=frame%2===0?0:1;
  px(x+2,y-4,2,4,'#221c18'); px(x+6,y-4+(leg?-1:0),2,4+(leg?1:0),'#221c18');
  if(p.lady){ px(x+1,y-9,8,5,c); px(x+2,y-13,6,5,c); }       // dress
  else { px(x+2,y-12,6,8,c); px(x+1,y-12,2,6,c); px(x+7,y-12,2,6,c); }
  px(x+3,y-16,4,4,sk);                                        // head
  if(p.hat){ px(x+2,y-18,6,2,'#1d1814'); px(x+1,y-16,8,1,'#1d1814'); }
  else if(p.lady){ px(x+2,y-17,6,2,'#5a3c28'); }
  const g=p.grump;
  if(g>0.55) px(x+3,y-15,1,1,g>0.8?P.bad:P.warn), px(x+6,y-15,1,1,g>0.8?P.bad:P.warn);
  if(g>0.85 && Math.floor(G.t*6)%2===0){ px(x+4,y-21,2,2,'rgba(255,255,255,.5)'); px(x+7,y-24,2,2,'rgba(255,255,255,.3)'); }
}
function moodColor(g){ return g<0.5?P.ok:(g<0.8?P.warn:P.bad); }
function bubble(x,y,txt,g){
  const w=Math.max(11,txt.length*6+5);
  px(x-w/2,y-11,w,11,P.cream); px(x-1,y,3,2,P.cream);
  px(x-w/2,y-12,w,1,moodColor(g)); px(x-w/2,y-1,w,1,moodColor(g));
  ctx.fillStyle='#1d1814'; ctx.font='8px monospace'; ctx.textAlign='center';
  ctx.fillText(txt,Math.round(x),y-3);
}

function drawFloor(f){
  const yb=sy(f*FLOOR_H);                    // baseline (walkable)
  const yt=yb-FLOOR_H;
  if(yb<-10||yt>VH+10) return;
  const wall=f===0?'#4a3b22':WALLS[f%WALLS.length];
  px(BX,yt,BW,FLOOR_H,wall);
  // deco wallpaper chevrons
  ctx.fillStyle='rgba(0,0,0,.14)';
  for(let x=BX+4;x<BX+BW-8;x+=16){ ctx.fillRect(x,yt+8,8,2); ctx.fillRect(x+4,yt+12,8,2); }
  if(f===0){ // gilded lobby
    px(BX,yt+2,BW,2,P.brass); px(BX,yb-8,BW,2,P.brass);
    for(let x=BX+10;x<SHX-10;x+=42){ px(x,yb-26,4,22,'#6b5325'); px(x-2,yt+18,8,4,P.brassHi); }
  }
  // slab
  px(BX,yb-6,BW,6,P.slab); px(BX,yb-6,BW,1,P.slabHi);
  // sconce
  px(HALLX+2,yt+16,4,6,P.brass); px(HALLX+2,yt+14,4,3,'#ffd970');
  // floor plaque
  px(SHX-24,yt+14,18,12,'#111'); px(SHX-23,yt+15,16,10,P.brass);
  ctx.fillStyle='#1d1814'; ctx.font='8px monospace'; ctx.textAlign='center';
  ctx.fillText(floorName(f),SHX-15,yt+23);
  // waiting queue
  const q=waitersAt(f);
  q.forEach((p,i)=>{
    const targetX=SHX-40-i*16;
    if(p.x===0)p.x=HALLX-10;
    p.x+=(targetX-p.x)*0.06; p.walk+=Math.abs(targetX-p.x)>1?0.2:0;
    drawPerson(p.x,yb-6,p,Math.floor(p.walk));
    bubble(p.x+5,yb-32,floorName(p.dest),p.grump);
    px(p.x,yb-3,10,2,'#0006'); px(p.x,yb-4,Math.round(10*Math.min(1,p.grump)),1,moodColor(p.grump));
  });
  // storming out
  G.pax.filter(p=>p.state==='storming'&&p.from===f).forEach(p=>{
    p.x-=60*0.016; drawPerson(p.x,yb-6,p,Math.floor(G.t*10));
  });
}

function drawShaft(){
  const topY=sy(G.floors*FLOOR_H), botY=sy(-10);
  px(SHX,topY,SHW,botY-topY,P.shaft);
  for(let f=0;f<=G.floors;f++){ const y=sy(f*FLOOR_H); px(SHX,y-6,SHW,2,'#000'); }
  px(SHX+3,topY,2,botY-topY,P.rail); px(SHX+SHW-5,topY,2,botY-topY,P.rail);
  // car
  const cy=sy(G.pos*FLOOR_H);              // car floor baseline
  const carX=SHX+8,carW=SHW-16,carH=40;
  // cables
  px(carX+carW/2-6,topY,1,cy-carH-topY,'#555'); px(carX+carW/2+6,topY,1,cy-carH-topY,'#555');
  px(carX-3,cy-carH-4,carW+6,4,P.brassLo);
  px(carX,cy-carH,carW,carH-4,'#241f18');
  px(carX,cy-carH,carW,2,P.carHi); px(carX,cy-6,carW,3,P.carBody);
  px(carX-3,cy-3,carW+6,3,P.brassLo);
  // riders inside
  const rs=riders();
  rs.forEach((p,i)=>{
    const rx=carX+4+i*((carW-12)/Math.max(1,G.cap-1||1));
    drawPerson(rx,cy-7,p,0);
    ctx.fillStyle=p.angry?P.bad:P.cream; ctx.font='7px monospace'; ctx.textAlign='center';
    ctx.fillText(floorName(p.dest),rx+5,cy-carH+8);
  });
  // doorway transfer walker
  if(G.transfer){
    const p=G.transfer, prog=1-G.transferT/0.45;
    const fromX=p.state==='boarding'?SHX-14:carX+carW/2, toX=p.state==='boarding'?carX+carW/2:SHX-18;
    drawPerson(fromX+(toX-fromX)*prog,cy-7,p,Math.floor(G.t*10));
  }
  // accordion gate
  const open=G.doorT, gw=Math.round(carW*(1-open));
  if(gw>1){ for(let x=0;x<gw;x+=4){ px(carX+x,cy-carH+2,2,carH-8,P.brass); } px(carX,cy-carH+14,gw,1,P.brassLo); }
  // building facade edges over shaft
  px(SHX-2,topY,2,botY-topY,P.brassLo); px(SHX+SHW,topY,2,botY-topY,P.brassLo);
}

function drawBuilding(){
  px(0,0,VW,VH,P.night);
  // stars
  for(let i=0;i<40;i++){ const x=(i*137)%VW, y=(i*211+((i%3)*97))%VH; if((i+Math.floor(G.t))%9>0) px(x,y,1,1,'rgba(244,232,207,.25)'); }
  for(let f=0;f<G.floors;f++) drawFloor(f);
  // roof / construction of next floor
  const ry=sy(G.floors*FLOOR_H);
  px(BX,ry-4,BW,6,P.slab);
  px(BX+10,ry-20,4,16,'#4a3b2c'); px(BX+BW-60,ry-20,4,16,'#4a3b2c');
  px(BX+4,ry-22,BW-40,3,'#4a3b2c');
  ctx.fillStyle='rgba(244,232,207,.35)'; ctx.font='8px monospace'; ctx.textAlign='left';
  ctx.fillText('FLOOR '+floorName(G.floors)+' — OPENING SOON ('+(G.nextFloorAt-G.delivered)+' guests to go)',BX+14,ry-26);
  // outer walls
  px(BX-4,sy(G.floors*FLOOR_H)-24,4,sy(-10)-sy(G.floors*FLOOR_H)+24,'#171310');
  drawShaft();
  // ground
  px(0,sy(0),VW,VH-sy(0),'#0a0806');
  px(0,sy(0)-1,VW,2,'#000');
}

function drawDial(){
  const cx=VW/2, cyd=34, R=26;
  ctx.fillStyle='#141110'; ctx.beginPath(); ctx.arc(cx,cyd,R+6,Math.PI,0); ctx.fill();
  ctx.fillStyle=P.brass; ctx.beginPath(); ctx.arc(cx,cyd,R+4,Math.PI,0); ctx.fill();
  ctx.fillStyle='#221c14'; ctx.beginPath(); ctx.arc(cx,cyd,R,Math.PI,0); ctx.fill();
  px(cx-R-10,cyd,R*2+20,3,P.brass);
  const top=G.floors-1;
  for(let f=0;f<G.floors;f++){
    const a=Math.PI+(f/Math.max(1,top))*Math.PI;
    const tx=cx+Math.cos(a)*(R-5), ty=cyd+Math.sin(a)*(R-5);
    ctx.fillStyle=P.cream; ctx.font='7px monospace'; ctx.textAlign='center';
    if(G.floors<=10||f%2===0||f===top) ctx.fillText(floorName(f),tx,ty+2);
    const ox=cx+Math.cos(a)*(R-1), oy=cyd+Math.sin(a)*(R-1);
    px(ox-1,oy-1,2,2,P.brassLo);
  }
  const a=Math.PI+(G.pos/Math.max(1,top))*Math.PI;
  ctx.strokeStyle=P.rust; ctx.lineWidth=2; ctx.beginPath();
  ctx.moveTo(cx,cyd); ctx.lineTo(cx+Math.cos(a)*(R-4),cyd+Math.sin(a)*(R-4)); ctx.stroke();
  px(cx-2,cyd-2,4,4,P.brassHi);
  // flush lamp
  const ok=flushFloor()>=0;
  px(cx+R+14,cyd-8,8,8,ok?P.ok:'#332a20');
  ctx.strokeStyle=P.brassLo; ctx.strokeRect(cx+R+13.5,cyd-8.5,9,9);
  // fine alignment bubble
  const off=G.pos-Math.round(G.pos);
  px(cx-R-38,cyd-6,20,6,'#141110'); px(cx-R-38+9+Math.round(off*80),cyd-5,3,4,Math.abs(off)<0.085?P.ok:P.warn);
}

function drawHUD(){
  ctx.font='9px monospace';
  // tips
  ctx.fillStyle=P.brassHi; ctx.textAlign='left';
  ctx.fillText('TIPS $'+G.tips.toFixed(2),8,14);
  ctx.fillStyle=P.cream;
  ctx.fillText('CAR '+riders().length+'/'+G.cap,8,26);
  ctx.fillText('BEST FL '+floorName(G.maxFloor),8,38);
  // strikes
  for(let i=0;i<3;i++){ px(VW-60+i*16,8,10,10,i<G.strikes?P.bad:'#2a231c'); ctx.strokeStyle=P.brassLo; ctx.strokeRect(VW-60.5+i*16,7.5,11,11); }
  ctx.fillStyle=P.cream; ctx.textAlign='right'; ctx.fillText('STRIKES',VW-8,32);
  drawDial();
  // minimap
  const mx=VW-16,mh=VH-70,my=50;
  px(mx-2,my-2,12,mh+4,'#141110'); ctx.strokeStyle=P.brassLo; ctx.strokeRect(mx-2.5,my-2.5,13,mh+5);
  for(let f=0;f<G.floors;f++){
    const y=my+mh-(f/(G.floors-1||1))*mh;
    px(mx,y-1,8,1,P.rail);
    const q=waitersAt(f);
    if(q.length){ const worst=Math.max(...q.map(p=>p.grump)); px(mx,y-4,Math.min(8,q.length*2),3,moodColor(worst)); }
  }
  const cy2=my+mh-(G.pos/(G.floors-1||1))*mh;
  px(mx+1,cy2-3,6,6,P.brassHi);
  // message banner
  if(G.msgT>0&&G.msg){
    ctx.fillStyle='rgba(13,11,9,.85)'; const w=G.msg.length*6+24;
    ctx.fillRect(VW/2-w/2,VH-34,w,18);
    px(VW/2-w/2,VH-34,w,1,P.brass); px(VW/2-w/2,VH-17,w,1,P.brass);
    ctx.fillStyle=P.brassHi; ctx.textAlign='center'; ctx.fillText(G.msg,VW/2,VH-22);
  }
}

function drawOverlay(title,lines){
  ctx.fillStyle='rgba(13,11,9,.88)'; ctx.fillRect(0,0,VW,VH);
  ctx.strokeStyle=P.brass; ctx.strokeRect(30.5,30.5,VW-61,VH-61);
  ctx.strokeStyle=P.brassLo; ctx.strokeRect(34.5,34.5,VW-69,VH-69);
  ctx.fillStyle=P.brassHi; ctx.font='16px monospace'; ctx.textAlign='center';
  ctx.fillText(title,VW/2,74);
  ctx.font='9px monospace'; ctx.fillStyle=P.cream;
  lines.forEach((l,i)=>ctx.fillText(l,VW/2,104+i*16));
  if(Math.floor(G.t*2)%2===0){ ctx.fillStyle=P.brass; ctx.fillText(G.state==='title'?'— PRESS SPACE TO CLOCK IN —':'— PRESS ENTER FOR A NEW SHIFT —',VW/2,VH-52); }
}

function draw(){
  ctx.save();
  if(G.shake>0) ctx.translate(rnd(3)-1,rnd(3)-1);
  drawBuilding();
  drawHUD();
  ctx.restore();
  if(G.state==='title'){
    drawOverlay('THE GRAND ASCENT',[
      'You are the lift. The lift is you.',
      '',
      'ARROWS drive the lever — the car has momentum.',
      'SPACE works the gate — only when flush with a floor.',
      'Deliver guests before they boil over. 3 walk-outs and',
      'the management lets you go.',
      '',
      'Happy guests tip. Tips build new floors.',
      'BEST: FLOOR '+floorName(G.hs.floor)+'  ·  $'+G.hs.tips.toFixed(2),
    ]);
  } else if(G.state==='over'){
    drawOverlay('SHIFT TERMINATED',[
      'The revolving door hits you on the way out.',
      '',
      'HIGHEST FLOOR REACHED:  '+floorName(G.maxFloor),
      'TIPS EARNED:  $'+G.tips.toFixed(2),
      'GUESTS DELIVERED:  '+G.delivered,
      '',
      'HOUSE BEST: FLOOR '+floorName(G.hs.floor)+'  ·  $'+G.hs.tips.toFixed(2),
    ]);
  }
}

/* ---------- loop ---------- */
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt); draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
